server:
  servlet:
    context-path: "/application-service"
  port: 8084

spring:
  main:
    allow-circular-references: true
  datasource:
    url: jdbc:postgresql://localhost:5436/application_service
    username: application
    password: application
    driver-class-name: org.postgresql.Driver
  jpa:
    database: POSTGRESQL
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  thymeleaf:
    mode: HTML
    encoding: UTF-8
    cache: false
  kafka:
    bootstrap-servers: localhost:9093
    consumer:
      group-id: application-service
      auto-offset-reset: earliest
    properties:
      schema.registry.url: http://localhost:8082

kafka:
  topic:
    processing-errors-dlq-topic-name: application-service-processing-errors-dlq

springdoc:
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    org.springframework: INFO
    com.guce: DEBUG
    org.hibernate.SQL: DEBUG
